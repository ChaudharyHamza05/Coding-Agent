<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Agent</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar: file tree -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-mark">&gt;_</span>
        <span class="logo-text">coding<span class="accent">agent</span></span>
      </div>

      <button id="new-chat-btn" class="new-chat-btn" title="Starat a new session">
        + new session
      </button>
      <button id="history-btn" class="history-btn" type="button" title="View previous chats">
        🕑 previous chats
      </button>

      <div class="sidebar-section">
        <div class="sidebar-label">workspace</div>
        <ul id="file-list" class="file-list">
          <li class="file-empty">no files</li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <label class="upload-btn" for="file-input">
          <span>+ Upload files here</span>
        </label>
        <input type="file" id="file-input" hidden multiple />
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
      <div class="chat-scroll" id="chat-scroll">
        <div class="welcome" id="welcome-msg">
          <div class="welcome-title">Your Coding Agent is ready</div>
          <div class="welcome-sub">Ask me anything!</div>
        </div>
        <div id="messages"></div>
      </div>

      <form id="chat-form" class="composer">
        <span class="prompt-caret">›</span>
        <textarea
          id="chat-input"
          class="composer-input"
          placeholder="Ask me anything..."
          rows="1"
        ></textarea>
        <button type="submit" class="send-btn" id="send-btn" aria-label="Bhejein">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 12L20 4L14 20L11 13L4 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <!-- Previous chats modal -->
  <div id="history-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <span>Purani Chats</span>
        <button id="close-history-btn" class="modal-close" type="button">&times;</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </div>
  </div>

  <!-- File preview modal -->
  <div id="file-modal" class="modal-overlay" hidden>
    <div class="modal-box modal-box-wide">
      <div class="modal-header">
        <span id="file-modal-title">File</span>
        <button id="close-file-modal-btn" class="modal-close" type="button">&times;</button>
      </div>
      <div id="file-modal-body" class="file-modal-body"></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
